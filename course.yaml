title: PostgreSQL Cookbook
description:
  ru: |
    Практический курс по PostgreSQL 18 для разработчиков приложений (не для DBA) на Go.
    От первого подключения и типов данных до индексов, MVCC, JSONB, оконных функций и серверной
    логики — и капстонов с outbox/CDC. SQL пишется руками, типизируется через sqlc, весь код
    запускается на локальном sandbox (postgres:18 + Adminer) и оставляет наблюдаемый эффект —
    это рабочие сценарии, а не лекции «на доске».
  en: |
    A hands-on PostgreSQL 18 course for application developers (not DBAs), in Go. From the first
    connection and data types to indexes, MVCC, JSONB, window functions, and server-side logic —
    plus capstones with outbox/CDC. You write SQL by hand, type it with sqlc, and every snippet
    runs on a local sandbox (postgres:18 + Adminer) and leaves an observable effect — working
    scenarios, not whiteboard lectures.
basePath: /postgres-cookbook
repoUrl: https://github.com/dsbasko/postgres-cookbook

# Branding for the engine (@dsbasko/cookbook-engine). Mirrors the Kafka Cookbook
# layout, rebranded for Postgres. Unlike Kafka (which keeps the engine's
# hand-tuned 3-theme accent defaults), this course sets brand.accent /
# brand.accentDark to recolour the whole UI to the Postgres blue — the engine
# derives hover/soft shades from these via color-mix.
brand:
  accent: "#336791"
  accentDark: "#5a9fd4"
  glyph: "P"
  level: "Go"
  siteUrl: https://dsbasko.github.io
  breadcrumbRoot: { ru: PostgreSQL Cookbook, en: PostgreSQL Cookbook }
  hero:
    lead: { ru: PostgreSQL, en: PostgreSQL }
    accent: { ru: "для тех, кто", en: "for people who" }
    tail: { ru: "пишет на Go", en: "write Go" }
  ogImage:
    title: { ru: PostgreSQL Cookbook, en: PostgreSQL Cookbook }
    footerTag: "PostgreSQL · Go"

modules:
  - id: 00-getting-connected
    title: { ru: Подключение и ориентация, en: Getting connected }
    description:
      ru: |
        Клиент-сервер, локальный sandbox (postgres:18 + Adminer), psql как рабочий инструмент,
        подключение из Go через pgxpool и типизированные запросы через sqlc. После этого модуля
        есть рабочий конвейер «SQL руками → sqlc generate → типизированный pgx-код», на который
        опираются все остальные темы.
      en: |
        Client-server, the local sandbox (postgres:18 + Adminer), psql as a working tool,
        connecting from Go via pgxpool, and typed queries via sqlc. After this module you have a
        working pipeline — "SQL by hand → sqlc generate → typed pgx code" — that every other topic
        builds on.
    lessons:
      - slug: 00-01-client-server-and-sandbox
        title: { ru: Клиент, сервер и песочница, en: Client, server, and the sandbox }
        duration: 25m
        tags: [client-server, sandbox, sqlc, pgx]
      - slug: 00-02-psql-survival-kit
        title: { ru: psql на каждый день, en: psql survival kit }
        duration: 20m
        tags: [psql, meta-commands, tooling, escape-hatch]
      - slug: 00-03-connecting-from-go
        title: { ru: Подключение из Go, en: Connecting from Go }
        duration: 25m
        tags: [pgx, pgxpool, parameters, sql-injection]
      - slug: 00-04-typed-queries-with-sqlc
        title: { ru: Типизированные запросы через sqlc, en: Typed queries via sqlc }
        duration: 25m
        tags: [sqlc, codegen, pgx, parameters]
      - slug: 00-05-connection-lifecycle-and-pooling
        title: { ru: Жизненный цикл соединения и пулинг, en: Connection lifecycle and pooling }
        duration: 20m
        tags: [pgxpool, pooling, pg_stat_activity, lifecycle]

  - id: 01-data-types
    title: { ru: Типы данных, en: Data types }
    description:
      ru: |
        Какой тип выбрать и почему: numeric vs float для денег, text/boolean/null, timestamptz
        для времени, uuid и PG18 uuidv7, enum/массивы и введение в jsonb. Правильный тип на старте
        снимает целый класс багов на проде.
      en: |
        Which type to pick and why: numeric vs float for money, text/boolean/null, timestamptz for
        time, uuid and PG18 uuidv7, enums/arrays, and an intro to jsonb. The right type up front
        removes a whole class of production bugs.
    lessons:
      - slug: 01-01-numbers-and-money
        title: { ru: Числа и деньги, en: Numbers and money }
        duration: 25m
        tags: [numeric, float, money, bigint]
      - slug: 01-02-text-boolean-and-null-teaser
        title: { ru: text, boolean и тизер NULL, en: text, boolean, and the NULL teaser }
        duration: 20m
        tags: [text, boolean, "null", three-valued-logic]
      - slug: 01-03-date-time-timestamptz
        title: { ru: Дата, время и timestamptz, en: Date, time, and timestamptz }
        duration: 20m
        tags: [timestamptz, time-zones, psql, escape-hatch]
      - slug: 01-04-uuid-and-uuidv7
        title: { ru: uuid и uuidv7, en: uuid and uuidv7 }
        duration: 25m
        tags: [uuid, uuidv7, primary-key, pg18]
      - slug: 01-05-enums-arrays-and-jsonb-intro
        title: { ru: enum, массивы и intro в jsonb, en: enums, arrays, and a jsonb intro }
        duration: 25m
        tags: [enum, arrays, jsonb, containers]

  - id: 02-schema-and-constraints
    title: { ru: Схема, DDL и ограничения, en: Schema, DDL, and constraints }
    description:
      ru: |
        Identity vs serial, NOT NULL, первичные и внешние ключи, UNIQUE/CHECK, генерируемые столбцы
        и домены (PG18 virtual vs stored), и мышление миграций — какие ALTER мгновенны, а какие
        переписывают таблицу и блокируют запись.
      en: |
        Identity vs serial, NOT NULL, primary and foreign keys, UNIQUE/CHECK, generated columns and
        domains (PG18 virtual vs stored), and a migration mindset — which ALTERs are instant and
        which rewrite the table and block writes.
    lessons:
      - slug: 02-01-identity-and-defaults
        title: { ru: identity и defaults, en: identity and defaults }
        duration: 20m
        tags: [identity, serial, default, pg18]
      - slug: 02-02-not-null-pk-natural-vs-surrogate
        title: { ru: "NOT NULL, PK, натуральный vs суррогатный ключ", en: "NOT NULL, PK, natural vs surrogate key" }
        duration: 20m
        tags: [primary-key, not-null, surrogate-key, natural-key]
      - slug: 02-03-foreign-keys
        title: { ru: Внешние ключи (CASCADE/SET NULL), en: Foreign keys (CASCADE/SET NULL) }
        duration: 25m
        tags: [foreign-key, on-delete, cascade, referential-integrity]
      - slug: 02-04-unique-and-check
        title: { ru: UNIQUE и CHECK (NULLS NOT DISTINCT), en: UNIQUE and CHECK (NULLS NOT DISTINCT) }
        duration: 20m
        tags: [unique, check, nulls-not-distinct, pg15]
      - slug: 02-05-generated-columns-and-domains
        title: { ru: Генерируемые столбцы и домены, en: Generated columns and domains }
        duration: 25m
        tags: [generated-columns, virtual, stored, domain, pg18, escape-hatch]
      - slug: 02-06-alter-table-migration-mindset
        title: { ru: "ALTER TABLE: мышление миграций", en: "ALTER TABLE: a migration mindset" }
        duration: 25m
        tags: [alter-table, migrations, locks, not-valid, escape-hatch]

  - id: 03-crud-fluency
    title: { ru: CRUD-беглость, en: CRUD fluency }
    description:
      ru: |
        Уверенный CRUD: INSERT ... RETURNING, SELECT с WHERE/ORDER/LIMIT и keyset-пагинация,
        безопасные UPDATE/DELETE, upsert через ON CONFLICT, PG18 RETURNING old/new и трезвая
        семантика NULL (ловушка NOT IN + NULL, COALESCE/NULLIF/IS DISTINCT FROM).
      en: |
        Confident CRUD: INSERT ... RETURNING, SELECT with WHERE/ORDER/LIMIT and keyset pagination,
        safe UPDATE/DELETE, upsert via ON CONFLICT, PG18 RETURNING old/new, and sober NULL semantics
        (the NOT IN + NULL trap, COALESCE/NULLIF/IS DISTINCT FROM).
    lessons:
      - slug: 03-01-insert-and-returning
        title: { ru: INSERT и RETURNING, en: INSERT and RETURNING }
        duration: 25m
        tags: [insert, returning, crud, sqlc]
      - slug: 03-02-select-where-order-limit
        title: { ru: "SELECT: WHERE/ORDER/LIMIT и keyset", en: "SELECT: WHERE/ORDER/LIMIT and keyset" }
        duration: 25m
        tags: [select, pagination, keyset, offset]
      - slug: 03-03-update-delete-safely
        title: { ru: UPDATE/DELETE безопасно, en: UPDATE/DELETE safely }
        duration: 25m
        tags: [update, delete, transaction, returning]
      - slug: 03-04-upsert-on-conflict
        title: { ru: upsert через ON CONFLICT, en: upsert via ON CONFLICT }
        duration: 20m
        tags: [upsert, on-conflict, excluded, idempotency]
      - slug: 03-05-returning-old-new
        title: { ru: RETURNING old/new, en: RETURNING old/new }
        duration: 20m
        tags: [returning, pg18, audit, escape-hatch]
      - slug: 03-06-null-semantics-reckoning
        title: { ru: Трезвая семантика NULL, en: Sober NULL semantics }
        duration: 20m
        tags: ["null", three-valued-logic, not-in, coalesce]

  - id: 04-querying-across-tables
    title: { ru: Запросы по таблицам, en: Querying across tables }
    description:
      ru: |
        Связываем данные: join'ы (inner/left/right/full), self-join'ы, агрегация GROUP BY/HAVING,
        DISTINCT ON (последний заказ на клиента), подзапросы EXISTS vs IN и CTE с материализацией.
        Здесь данные превращаются в ответы на вопросы бизнеса.
      en: |
        Tying data together: joins (inner/left/right/full), self-joins, aggregation with
        GROUP BY/HAVING, DISTINCT ON (the latest order per customer), EXISTS vs IN subqueries, and
        CTEs with materialization. This is where data turns into answers to business questions.
    lessons:
      - slug: 04-01-joins-inner-left-right-full
        title: { ru: "JOIN: inner/left/right/full", en: "JOIN: inner/left/right/full" }
        duration: 25m
        tags: [join, inner, left, right, full, sqlc]
      - slug: 04-02-multi-table-and-self-joins
        title: { ru: Многотабличные и self-join, en: Multi-table and self-joins }
        duration: 25m
        tags: [join, multi-table, self-join, alias]
      - slug: 04-03-aggregation-group-by-having
        title: { ru: "Агрегация: GROUP BY/HAVING", en: "Aggregation: GROUP BY/HAVING" }
        duration: 25m
        tags: [aggregation, group-by, having, count]
      - slug: 04-04-distinct-on
        title: { ru: DISTINCT ON, en: DISTINCT ON }
        duration: 20m
        tags: [distinct-on, order-by, top-n, postgres-specific]
      - slug: 04-05-subqueries-exists-vs-in
        title: { ru: "Подзапросы: EXISTS vs IN", en: "Subqueries: EXISTS vs IN" }
        duration: 25m
        tags: [subquery, exists, "in", not-in, "null"]
      - slug: 04-06-ctes-and-materialization
        title: { ru: CTE и материализация, en: CTEs and materialization }
        duration: 25m
        tags: [cte, with, materialized, readability]

  - id: 05-transactions-and-mvcc
    title: { ru: Транзакции, MVCC и конкурентность, en: Transactions, MVCC, and concurrency }
    description:
      ru: |
        Как Postgres ведёт себя под конкурентной нагрузкой: ACID и транзакции, ментальная модель
        MVCC (видимые xmin/xmax), блокировки строк и потерянные обновления, уровни изоляции для
        разработчика, ретраи на 40001 и дедлоки с advisory-локами.
      en: |
        How Postgres behaves under concurrency: ACID and transactions, an MVCC mental model
        (visible xmin/xmax), row locks and lost updates, isolation levels for developers, retries on
        40001, and deadlocks with advisory locks.
    lessons:
      - slug: 05-01-transactions-and-acid
        title: { ru: Транзакции и ACID, en: Transactions and ACID }
        duration: 25m
        tags: [transactions, acid, atomicity, rollback, sqlc]
      - slug: 05-02-mvcc-mental-model
        title: { ru: Ментальная модель MVCC, en: The MVCC mental model }
        duration: 25m
        tags: [mvcc, transactions, snapshot, psql, escape-hatch]
      - slug: 05-03-row-locks-and-lost-updates
        title: { ru: Блокировки строк и потерянные обновления, en: Row locks and lost updates }
        duration: 25m
        tags: [locks, for-update, skip-locked, lost-update, escape-hatch]
      - slug: 05-04-isolation-levels-for-devs
        title: { ru: Уровни изоляции для разработчика, en: Isolation levels for developers }
        duration: 25m
        tags: [isolation, serializable, write-skew, "40001", escape-hatch]
      - slug: 05-05-retry-on-40001
        title: { ru: Ретрай на 40001, en: Retrying on 40001 }
        duration: 20m
        tags: ["40001", retry, serializable, pgconn, escape-hatch]
      - slug: 05-06-deadlocks-and-advisory-locks
        title: { ru: Дедлоки и advisory-локи, en: Deadlocks and advisory locks }
        duration: 25m
        tags: [deadlock, "40P01", advisory-lock, locks, escape-hatch]

  - id: 06-indexing-and-explain
    title: { ru: Индексы и EXPLAIN, en: Indexing and EXPLAIN }
    description:
      ru: |
        Производительность через чтение планов: EXPLAIN ANALYZE с buffers (в PG18 по умолчанию),
        B-tree и порядок столбцов (PG18 skip-scan), когда индексы не помогают (expression index),
        partial/covering/unique и Index-Only Scan, GIN для jsonb/массивов, CREATE INDEX CONCURRENTLY.
      en: |
        Performance through reading plans: EXPLAIN ANALYZE with buffers (on by default in PG18),
        B-tree and column order (PG18 skip-scan), when indexes don't help (expression index),
        partial/covering/unique and Index-Only Scan, GIN for jsonb/arrays, CREATE INDEX CONCURRENTLY.
    lessons:
      - slug: 06-01-reading-explain-analyze-buffers
        title: { ru: Чтение EXPLAIN ANALYZE, en: Reading EXPLAIN ANALYZE }
        duration: 25m
        tags: [explain, analyze, buffers, pg18, escape-hatch]
      - slug: 06-02-btree-and-composite-column-order
        title: { ru: "B-tree и порядок столбцов", en: "B-tree and column order" }
        duration: 25m
        tags: [btree, composite-index, left-prefix, skip-scan, escape-hatch]
      - slug: 06-03-when-indexes-dont-help
        title: { ru: Когда индексы не помогают, en: When indexes don't help }
        duration: 20m
        tags: [non-sargable, expression-index, "lower", escape-hatch]
      - slug: 06-04-partial-covering-and-unique
        title: { ru: "Частичные, покрывающие и уникальные", en: "Partial, covering, and unique" }
        duration: 25m
        tags: [partial-index, covering-index, include, index-only-scan, escape-hatch]
      - slug: 06-05-gin-for-jsonb-and-arrays
        title: { ru: GIN для jsonb и массивов, en: GIN for jsonb and arrays }
        duration: 25m
        tags: [gin, jsonb, arrays, containment, escape-hatch]
      - slug: 06-06-create-index-concurrently
        title: { ru: CREATE INDEX CONCURRENTLY, en: CREATE INDEX CONCURRENTLY }
        duration: 20m
        tags: [create-index-concurrently, locks, migrations, escape-hatch]

