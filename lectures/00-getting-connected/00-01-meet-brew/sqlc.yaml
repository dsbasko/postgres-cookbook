# sqlc.yaml — копия канонического конфига из эталонного юнита.
#
# Конвейер урока: query.sql пишем РУКАМИ (протагонист), затем `make gen`
# (sqlc generate) превращает его в типизированный pgx-код в internal/db/ —
# который мы КОММИТИМ. schema перечисляет И baseline-канон
# (../../../schema/brew.sql), И добавки юнита (schema.sql). У этого юнита своих
# таблиц нет — запросы идут к канону Brew.
version: "2"
sql:
  - engine: postgresql
    queries: query.sql
    schema:
      - ../../../schema/brew.sql
      - schema.sql
    gen:
      go:
        package: db
        out: internal/db
        sql_package: pgx/v5
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_exact_table_names: false
